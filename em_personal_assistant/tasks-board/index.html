
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Hub – Sandra Santos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-y:auto;scrollbar-width:thin;scrollbar-color:#d0d7de transparent}
body{background:#f6f8fa;color:#1f2328;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;font-size:13px;line-height:1.5}

/* ── Top bar (brand + tabs) ── */
.topbar{background:#fff;border-bottom:1px solid #d0d7de;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(31,35,40,.06)}
.topbar-inner{display:flex;align-items:stretch;height:52px;padding:0 20px;gap:0}
.brand{display:flex;flex-direction:column;justify-content:center;padding-right:24px;border-right:1px solid #d0d7de;margin-right:8px;flex-shrink:0}
.brand-title{font-size:17px;font-weight:800;color:#d4521a;letter-spacing:-0.5px;line-height:1.1}
.brand-sub{font-size:9.5px;color:#8c959f;font-weight:500;margin-top:1px}
.tab-nav{display:flex;align-items:stretch;gap:0;flex:1}
.tab-btn{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:12px;font-weight:600;color:#57606a;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:color .15s,border-color .15s;white-space:nowrap;margin-bottom:-1px}
.tab-btn:hover{color:#1f2328;background:#f6f8fa}
.tab-btn.active{color:#d4521a;border-bottom-color:#d4521a}
.tab-icon{font-size:13px}
.tab-badge{background:#d0d7de;color:#57606a;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px;min-width:16px;text-align:center}
.tab-btn.active .tab-badge{background:#d4521a;color:#fff}
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;padding-left:16px}
.sync-time{font-size:11px;color:#8c959f;white-space:nowrap}

/* ── Buttons ── */
.btn{padding:5px 12px;border-radius:6px;border:1px solid transparent;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s;white-space:nowrap;font-family:inherit}
.btn:hover{opacity:.82}
.btn-purple{background:#8250df;border-color:#8250df;color:#fff}
.btn-gray{background:#f6f8fa;border-color:#d0d7de;color:#24292f}
.btn-gray:hover{background:#eef1f5}
.btn-orange{background:#d4521a;border-color:#d4521a;color:#fff}
.btn-red{background:#fff0ee;border-color:#ffbdba;color:#cf222e}
.btn-green{background:#dafbe1;border-color:#9bd3a3;color:#1a7f37}
.btn-dark{background:#24292f;border-color:#24292f;color:#fff}

/* ── Tab panels ── */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ══════════════════════════════
   TASKS BOARD TAB
══════════════════════════════ */

/* ── Sub-header (stats + actions) ── */
.board-subheader{background:#fff;border-bottom:1px solid #d0d7de;padding:7px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.board-stats{display:flex;align-items:center;gap:6px;font-size:12px;color:#8c959f;flex:1}
.board-stats strong{color:#1f2328;font-weight:700}
.stat-sep{color:#d0d7de}
.board-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.kbd-hints{font-size:9.5px;color:#b0b8c2;white-space:nowrap}

/* ── Filter bar ── */
.filter-bar{padding:7px 20px;border-bottom:1px solid #d0d7de;display:flex;align-items:center;gap:10px;background:#fff;flex-wrap:wrap}
.filter-label{font-size:9.5px;font-weight:700;color:#8c959f;letter-spacing:.1em}
.filter-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag-btn{padding:2px 9px;border-radius:10px;font-size:10px;font-weight:600;border:1.5px solid;background:transparent;cursor:pointer;transition:all .15s;font-family:inherit}
.tag-btn:hover{opacity:.85}
.t-access{border-color:#0969da;color:#0969da}.t-access.active{background:#0969da;color:#fff}
.t-approval{border-color:#bf8700;color:#bf8700}.t-approval.active{background:#bf8700;color:#fff}
.t-decision{border-color:#cf222e;color:#cf222e}.t-decision.active{background:#cf222e;color:#fff}
.t-follow-up{border-color:#9a6700;color:#9a6700}.t-follow-up.active{background:#9a6700;color:#fff}
.t-hr{border-color:#8250df;color:#8250df}.t-hr.active{background:#8250df;color:#fff}
.t-planning{border-color:#0550ae;color:#0550ae}.t-planning.active{background:#0550ae;color:#fff}
.t-review{border-color:#1a7f37;color:#1a7f37}.t-review.active{background:#1a7f37;color:#fff}
.t-custom{border-color:#8c959f;color:#57606a}.t-custom.active{background:#57606a;color:#fff}

/* ── Board ── */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:12px 20px;height:calc(100vh - 168px);overflow:hidden}
.column{display:flex;flex-direction:column;background:#fff;border-radius:8px;border:1px solid #d0d7de;overflow:hidden;box-shadow:0 1px 3px rgba(31,35,40,.04)}
.col-adhoc{border-top:3px solid #2ea043}
.col-slack{border-top:3px solid #8250df}
.col-email{border-top:3px solid #0969da}
.col-head{padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #d0d7de;background:#f6f8fa}
.col-icon{font-size:13px;line-height:1}
.col-name{font-size:12px;font-weight:700;color:#1f2328;flex:1}
.col-badge{min-width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;padding:0 5px}
.col-adhoc .col-badge{background:#2ea043}
.col-slack .col-badge{background:#8250df}
.col-email .col-badge{background:#0969da}
.col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:#d0d7de;border-radius:2px}

/* ── Cards ── */
.card{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:10px 12px;transition:border-color .15s,box-shadow .15s;cursor:pointer}
.card:hover{border-color:#0969da;box-shadow:0 2px 8px rgba(9,105,218,.12)}
.card.is-done{opacity:.45}
.card-head{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px}
.p-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.p-high .p-dot{background:#cf222e}
.p-medium .p-dot{background:#bf8700}
.p-low .p-dot{background:#2ea043}
.card-title{font-size:12px;font-weight:700;color:#1f2328;line-height:1.3;flex:1}
.badge-new{background:#ddf4ff;color:#0550ae;border:1px solid #54aeff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;flex-shrink:0;margin-left:4px;align-self:flex-start}
.card-summary{font-size:11px;color:#57606a;line-height:1.45;margin-bottom:7px}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.prio-lbl{font-size:9px;font-weight:800;letter-spacing:.04em}
.p-high .prio-lbl{color:#cf222e}
.p-medium .prio-lbl{color:#bf8700}
.p-low .prio-lbl{color:#2ea043}
.src-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.04em;border:1px solid #d0d7de;color:#57606a;background:#f6f8fa}
.st-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px}
.st-todo{background:#ddf4ff;color:#0550ae;border:1px solid #54aeff}
.st-inprogress{background:#fff8c5;color:#9a6700;border:1px solid #e3b341}
.st-done{background:#dafbe1;color:#1a7f37;border:1px solid #9bd3a3}
.card-from{font-size:10px;color:#8c959f;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-time{font-size:10px;color:#b0b8c2}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px}
.ctag{font-size:9px;padding:1px 6px;border-radius:8px;border:1px solid;font-weight:600}
.ctag-access{border-color:#0969da;color:#0969da}
.ctag-approval{border-color:#bf8700;color:#bf8700}
.ctag-decision{border-color:#cf222e;color:#cf222e}
.ctag-follow-up{border-color:#9a6700;color:#9a6700}
.ctag-hr{border-color:#8250df;color:#8250df}
.ctag-planning{border-color:#0550ae;color:#0550ae}
.ctag-review{border-color:#1a7f37;color:#1a7f37}
.ctag-custom{border-color:#8c959f;color:#57606a}
.card-actions{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.st-sel{background:#fff;border:1px solid #d0d7de;color:#24292f;font-size:10px;padding:3px 6px;border-radius:5px;cursor:pointer;font-family:inherit}
.st-sel:focus{outline:none;border-color:#0969da}
.act-btn{padding:3px 8px;border-radius:5px;border:1px solid;font-size:10px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit}
.act-btn:hover{opacity:.78}
.btn-open{background:#ddf4ff;color:#0550ae;border-color:#54aeff}
.btn-slack-open{background:#f0ebff;color:#8250df;border-color:#c4affe}
.btn-done-c{background:#dafbe1;color:#1a7f37;border-color:#9bd3a3}
.btn-del{background:transparent;color:#8c959f;border-color:#d0d7de;font-size:11px;padding:2px 6px}
.col-empty{text-align:center;padding:24px 12px;color:#8c959f;font-size:11px;line-height:1.6}
.col-empty-icon{font-size:22px;margin-bottom:6px;display:block}

/* ── Completed section ── */
.completed-wrap{margin:0 20px 16px;border:1px solid #d0d7de;border-radius:8px;overflow:hidden;background:#fff}
.completed-hdr{padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;background:#f6f8fa;user-select:none}
.completed-hdr:hover{background:#eef1f5}
.completed-title{font-size:11px;font-weight:700;color:#57606a}
.completed-cnt{background:#d0d7de;color:#57606a;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px}
.caret{color:#8c959f;margin-left:auto;font-size:10px}
.completed-body{padding:8px;display:none;gap:6px;flex-direction:column}
.completed-body.open{display:flex}

/* ── Add Task Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(31,35,40,.5);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal-backdrop.open{display:flex}
.modal{background:#fff;border:1px solid #d0d7de;border-radius:12px;width:480px;max-width:92vw;padding:24px;box-shadow:0 16px 48px rgba(31,35,40,.2)}
.modal-title{font-size:15px;font-weight:800;color:#1f2328;margin-bottom:16px}
.fg{margin-bottom:14px}
.fg label{font-size:10px;font-weight:700;color:#57606a;display:block;margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase}
.fi{width:100%;background:#fff;border:1px solid #d0d7de;color:#1f2328;padding:8px 10px;border-radius:6px;font-size:12px;font-family:inherit;transition:border-color .15s}
.fi:focus{outline:none;border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,.1)}
textarea.fi{resize:vertical;min-height:64px}
select.fi{cursor:pointer}
.tag-picks{display:flex;gap:5px;flex-wrap:wrap}
.tag-picks input{display:none}
.tag-picks label{padding:2px 9px;border-radius:9px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .15s;background:transparent;font-family:inherit}
.tag-picks input:checked+label.t-access{background:#0969da;color:#fff;border-color:#0969da}
.tag-picks input:checked+label.t-approval{background:#bf8700;color:#fff;border-color:#bf8700}
.tag-picks input:checked+label.t-decision{background:#cf222e;color:#fff;border-color:#cf222e}
.tag-picks input:checked+label.t-follow-up{background:#9a6700;color:#fff;border-color:#9a6700}
.tag-picks input:checked+label.t-hr{background:#8250df;color:#fff;border-color:#8250df}
.tag-picks input:checked+label.t-planning{background:#0550ae;color:#fff;border-color:#0550ae}
.tag-picks input:checked+label.t-review{background:#1a7f37;color:#fff;border-color:#1a7f37}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── Detail Modal ── */
.detail-backdrop{position:fixed;inset:0;background:rgba(31,35,40,.5);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(2px)}
.detail-backdrop.open{display:flex}
.detail-modal{background:#fff;border:1px solid #d0d7de;border-radius:12px;width:580px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(31,35,40,.25);display:flex;flex-direction:column}
.dm-top{padding:14px 20px 12px;border-bottom:1px solid #d0d7de;display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:#fff;z-index:10;border-radius:12px 12px 0 0}
.dm-badges{display:flex;gap:6px;align-items:center;flex:1;flex-wrap:wrap}
.dm-close{background:none;border:none;color:#57606a;font-size:20px;cursor:pointer;padding:1px 5px;border-radius:4px;line-height:1;flex-shrink:0}
.dm-close:hover{background:#f6f8fa;color:#1f2328}
.dm-src-badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.05em;border:1px solid}
.dm-src-slack{background:#f0ebff;color:#8250df;border-color:#c4affe}
.dm-src-email{background:#ddf4ff;color:#0550ae;border-color:#54aeff}
.dm-src-adhoc{background:#dafbe1;color:#1a7f37;border-color:#9bd3a3}
.dm-prio-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;border:1px solid #d0d7de;background:#f6f8fa;color:#57606a}
.dm-prio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dm-body{padding:16px 20px;flex:1}
.dm-title{font-size:17px;font-weight:800;color:#1f2328;line-height:1.3;margin-bottom:8px}
.dm-meta{font-size:11px;color:#57606a;margin-bottom:16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dm-meta a{color:#0969da;text-decoration:none;font-weight:600}
.dm-meta a:hover{text-decoration:underline}
.dm-meta-sep{color:#d0d7de}
.dm-section{margin-bottom:16px}
.dm-section-label{font-size:10px;font-weight:700;color:#57606a;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.dm-textarea{width:100%;background:#f6f8fa;border:1px solid #d0d7de;color:#1f2328;padding:8px 10px;border-radius:6px;font-size:12px;font-family:inherit;transition:border-color .15s;resize:vertical;min-height:64px}
.dm-textarea:focus{outline:none;border-color:#0969da;background:#fff;box-shadow:0 0 0 3px rgba(9,105,218,.08)}
.dm-links-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.dm-link-row{display:flex;align-items:center;gap:6px;background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;padding:5px 8px}
.dm-link-open-btn{padding:3px 10px;background:#fff;border:1px solid #d0d7de;border-radius:5px;font-size:10px;font-weight:600;color:#1f2328;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;transition:background .15s}
.dm-link-open-btn:hover{background:#eef1f5}
.dm-link-url{font-size:11px;color:#0969da;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-link-del{background:none;border:none;color:#8c959f;cursor:pointer;padding:2px 5px;border-radius:3px;font-size:14px;line-height:1;flex-shrink:0}
.dm-link-del:hover{background:#fff0ee;color:#cf222e}
.dm-add-link-btn{padding:6px 12px;background:#fff;border:1.5px dashed #0969da;border-radius:6px;font-size:11px;font-weight:600;color:#0969da;cursor:pointer;width:100%;font-family:inherit;transition:background .15s}
.dm-add-link-btn:hover{background:#ddf4ff}
.dm-tags-area{display:flex;gap:5px;flex-wrap:wrap;align-items:center;padding:6px;background:#f6f8fa;border:1px solid #d0d7de;border-radius:6px;min-height:34px}
.dm-tag-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 7px;border-radius:8px;border:1.5px solid;font-weight:600}
.dm-tag-remove{background:none;border:none;cursor:pointer;color:inherit;opacity:.55;font-size:13px;line-height:1;padding:0 0 0 2px;font-weight:400}
.dm-tag-remove:hover{opacity:1}
.dm-tag-input{border:none;background:transparent;font-size:11px;font-family:inherit;color:#1f2328;outline:none;min-width:80px;padding:2px 4px}
.dm-tag-input::placeholder{color:#b0b8c2}
.dm-sp-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.dm-select{width:100%;background:#fff;border:1px solid #d0d7de;color:#1f2328;padding:7px 10px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer}
.dm-select:focus{outline:none;border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,.08)}
.dm-footer{padding:12px 20px;border-top:1px solid #d0d7de;display:flex;gap:8px;align-items:center;position:sticky;bottom:0;background:#fff;border-radius:0 0 12px 12px}
.dm-footer-left{flex:1;display:flex;gap:8px}
.dm-title-input{width:100%;font-size:17px;font-weight:800;color:#1f2328;line-height:1.3;margin-bottom:8px;border:1.5px solid transparent;border-radius:6px;padding:4px 7px;background:transparent;font-family:inherit;transition:border-color .15s,background .15s}
.dm-title-input:hover{border-color:#d0d7de;background:#f6f8fa}
.dm-title-input:focus{outline:none;border-color:#0969da;background:#fff;box-shadow:0 0 0 3px rgba(9,105,218,.08)}

/* ══════════════════════════════
   SKILLS TAB
══════════════════════════════ */
.skills-page{padding:20px}
.skills-header{margin-bottom:16px}
.skills-title{font-size:16px;font-weight:800;color:#1f2328;margin-bottom:4px}
.skills-subtitle{font-size:12px;color:#57606a}
.skills-search-bar{margin-bottom:16px}
.skills-search{width:100%;max-width:400px;background:#fff;border:1px solid #d0d7de;color:#1f2328;padding:8px 12px;border-radius:8px;font-size:12px;font-family:inherit;transition:border-color .15s}
.skills-search:focus{outline:none;border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,.08)}
.skills-section{margin-bottom:24px}
.skills-section-title{font-size:10px;font-weight:800;color:#8c959f;letter-spacing:.08em;text-transform:uppercase;padding:0 0 8px;border-bottom:1px solid #d0d7de;margin-bottom:10px}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.skill-card{background:#fff;border:1px solid #d0d7de;border-radius:8px;padding:14px 16px;transition:border-color .15s,box-shadow .15s;display:flex;flex-direction:column;gap:6px}
.skill-card:hover{border-color:#0969da;box-shadow:0 2px 8px rgba(9,105,218,.1)}
.skill-card-head{display:flex;align-items:flex-start;gap:8px}
.skill-icon{font-size:16px;flex-shrink:0;line-height:1.2}
.skill-name{font-size:13px;font-weight:700;color:#1f2328;line-height:1.3;flex:1}
.skill-plugin-badge{font-size:9px;font-weight:700;padding:1px 7px;border-radius:8px;background:#f0ebff;color:#8250df;border:1px solid #c4affe;white-space:nowrap;flex-shrink:0;align-self:flex-start;margin-top:1px}
.skill-desc{font-size:11px;color:#57606a;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.skill-no-results{padding:32px 0;text-align:center;color:#8c959f;font-size:12px}
.skill-no-results-icon{font-size:28px;display:block;margin-bottom:8px}

/* ── Built-in skills collapsible ── */
.skills-builtin-wrap{margin-top:8px;border:1px solid #d0d7de;border-radius:8px;overflow:hidden;background:#fff}
.skills-builtin-hdr{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;background:#f6f8fa;user-select:none}
.skills-builtin-hdr:hover{background:#eef1f5}
.skills-builtin-title{font-size:11px;font-weight:700;color:#57606a}
.skills-builtin-cnt{background:#d0d7de;color:#57606a;font-size:9px;font-weight:800;padding:1px 6px;border-radius:8px}
.skills-builtin-hint{font-size:10px;color:#b0b8c2;flex:1}
.skills-builtin-caret{color:#8c959f;font-size:10px}
.skills-builtin-body{padding:12px;display:none}
.skills-builtin-body.open{display:block}

@media(max-width:820px){
  .board{grid-template-columns:1fr;height:auto}.column{min-height:200px}
  .topbar-inner{flex-wrap:wrap;height:auto;padding:8px 16px}
  .board-stats{display:none}
  .skills-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Top bar with brand + tabs -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">

// State helpers
// ─────────────────────────────────────────────
function defaultState(){ return {items:{},adhoc:[]}; }
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(parsed && (parsed.items || parsed.adhoc)) {
        // Merge injected POOL_ADHOC with localStorage — POOL_ADHOC wins for existing refs
        // so tasks added/edited in another browser are synced in
        const localRefs = new Set((parsed.adhoc||[]).map(a=>a.source_ref));
        const injectedNew = (POOL_ADHOC||[]).filter(a=>!localRefs.has(a.source_ref));
        if(injectedNew.length > 0){
          parsed.adhoc = [...(parsed.adhoc||[]), ...injectedNew];
        }
        return parsed;
      }
    }
    for(let v = STORAGE_KEY_VERSION; v >= 0; v--){
      const legacy = localStorage.getItem('tasks_board_v' + v);
      if(legacy){
        try{
          const parsed = JSON.parse(legacy);
          if(parsed) return parsed;
        }catch(e){}
      }
    }
  }catch(e){}
  // No localStorage at all — seed from injected POOL_ADHOC (e.g. GitHub Pages first load)
  return {items:{}, adhoc: POOL_ADHOC || []};
}
function saveState(s){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(s)); }catch(e){} }
let ST = loadState();
saveState(ST);
function getIS(ref){
  return ST.items[ref]||{status:'todo',done:false,doneAt:null,notes:'',customTags:[],customLinks:[],customSummary:null,customPriority:null};
}

const activeFilters = new Set();
function toggleFilter(btn){
  const t=btn.dataset.tag;
  if(activeFilters.has(t)){activeFilters.delete(t);btn.classList.remove('active');}
  else{activeFilters.add(t);btn.classList.add('active');}
  render();
}
function passesFilter(item){
  if(!activeFilters.size) return true;
  return [...activeFilters].some(f=>(item.allTags||[]).includes(f));
}

// Build item list
// ─────────────────────────────────────────────
function buildItems(){
  const syncMs = new Date(LAST_SYNCED).getTime();
  const newMs  = 15*60*1000;
  const emails = POOL_EMAIL.map(e=>({...e,
    title:e.title||e.subject||'(no subject)',
    from:e.from||e.sender||'',
    received_at:e.received_at||e.receivedDateTime||null,
    col:'email',srcType:'email',
    openUrl:e.webLink||('https://outlook.office.com/mail/search?q='+encodeURIComponent(e.subject||e.title||''))}));
  const slacks = POOL_SLACK.map(s=>({...s,title:s.title||s.channel||s.sender||s.text||'(no title)',col:'slack',srcType:'slack',openUrl:s.permalink||'#'}));
  const adhoc  = (ST.adhoc||[]).map(a=>({...a,col:'adhoc',srcType:'adhoc',openUrl:null}));
  return [...emails,...slacks,...adhoc].map(item=>{
    const is = getIS(item.source_ref);
    const fsa = item.first_seen_at ? new Date(item.first_seen_at).getTime() : 0;
    const allTags = [...(item.tags||[]),...(is.customTags||[])].filter((v,i,a)=>a.indexOf(v)===i);
    const effectivePriority = is.customPriority || item.priority || 'low';
    return {...item, priority:effectivePriority,
      status:is.status||'todo', done:is.done||false, doneAt:is.doneAt||null,
      isNew:fsa>0&&fsa>=syncMs-newMs&&!is.done,
      allTags, notes:is.notes||'', customTags:is.customTags||[],
      customLinks:is.customLinks||[], customSummary:is.customSummary||null};
  });
}

// Helpers

function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJS(s){ return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function fmtTime(item){
  let ts;
  if(item.srcType==='slack'&&item.ts) ts=new Date(item.ts*1000);
  else if(item.srcType==='email'&&item.received_at) ts=new Date(item.received_at);
  else if(item.created_at) ts=new Date(item.created_at);
  if(!ts||isNaN(ts)) return '';
  const now=new Date();
  const hm=ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  if(ts.toDateString()===now.toDateString()) return hm;
  return ts.toLocaleDateString('en-GB',{month:'short',day:'numeric'})+', '+hm;
}
function fmtDate(item){
  let ts;
  if(item.srcType==='slack'&&item.ts) ts=new Date(item.ts*1000);
  else if(item.srcType==='email'&&item.received_at) ts=new Date(item.received_at);
  else if(item.created_at) ts=new Date(item.created_at);
  if(!ts||isNaN(ts)) return '';
  return ts.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+', '+ts.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}
const PRIO_LABEL={high:'HIGH',medium:'MEDIUM',low:'LOW'};
const PRIO_DOT={high:'#cf222e',medium:'#bf8700',low:'#2ea043'};
const STATUS_MAP={todo:['TO DO','st-todo'],inprogress:['IN PROGRESS','st-inprogress'],done:['DONE','st-done']};

function renderTags(tags){
  if(!tags||!tags.length) return '';
  return tags.map(t=>`<span class="ctag ${tagCls(t)}">${esc(t)}</span>`).join('');
}

// ─────────────────────────────────────────────
// Priority sort helper (high → medium → low)
// ─────────────────────────────────────────────
const PRIO_ORDER={high:0,medium:1,low:2};
function byPriority(a,b){
  return (PRIO_ORDER[a.priority]??2)-(PRIO_ORDER[b.priority]??2);
}

// ─────────────────────────────────────────────
// Render board
// ─────────────────────────────────────────────
function render(){
  const all=buildItems();
  const today=new Date().toDateString();
  const active=all.filter(i=>!i.done&&passesFilter(i));
  const doneToday=all.filter(i=>i.done&&i.doneAt&&new Date(i.doneAt).toDateString()===today);
  const colA=active.filter(i=>i.col==='adhoc').sort(byPriority);
  const colS=active.filter(i=>i.col==='slack').sort(byPriority);
  const colE=active.filter(i=>i.col==='email').sort(byPriority);
  document.getElementById('stat-pending').textContent=active.length;
  document.getElementById('stat-high').textContent=active.filter(i=>i.priority==='high').length;
  document.getElementById('stat-done').textContent=doneToday.length;
  document.getElementById('completed-btn-n').textContent=doneToday.length;
  document.getElementById('completed-cnt').textContent=doneToday.length;
  // Update tasks tab badge
  document.getElementById('tab-badge-tasks').textContent=active.length;
  const sd=new Date(LAST_SYNCED);
  document.getElementById('sync-time').textContent=isNaN(sd)?'Last synced --:--':
    'Last synced '+sd.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const rCol=(items,icon,msg)=>items.length?items.map(renderCard).join(''):
    `<div class="col-empty"><span class="col-empty-icon">${icon}</span>${msg}</div>`;
  document.getElementById('col-adhoc').innerHTML=rCol(colA,'✏️','No tasks —<br>click + Add Task');
  document.getElementById('col-slack').innerHTML=rCol(colS,'💬','No pending DMs ✓');
  document.getElementById('col-email').innerHTML=rCol(colE,'📧','All clear ✓');
  document.getElementById('cnt-adhoc').textContent=colA.length;
  document.getElementById('cnt-slack').textContent=colS.length;
  document.getElementById('cnt-email').textContent=colE.length;
  document.getElementById('completed-body').innerHTML=doneToday.length?
    doneToday.map(renderCard).join(''):
    '<div class="col-empty">Nothing completed today yet</div>';
}

      <div class="dm-footer-left">

        <button class="btn btn-green" onclick="detailMarkDone('${escJS(ref)}')">✓ Mark Done</button>
      </div>
      <button class="btn btn-dark" onclick="closeDetail()">Close</button>
    </div>`;
}

function detailSaveTitle(ref){
  const val = document.getElementById('dm-title-input').value.trim();
  if(!val) return;
  const idx = (ST.adhoc||[]).findIndex(a=>a.source_ref===ref);
  if(idx>=0){ ST.adhoc[idx].title = val; saveState(ST); }
}
function detailSaveSummary(ref){
  setIS(ref,{customSummary:document.getElementById('dm-summary').value});
}
function detailSaveNotes(ref){
  setIS(ref,{notes:document.getElementById('dm-notes').value});
}
function detailSaveStatus(ref){
  const val=document.getElementById('dm-status').value;
  setIS(ref,{status:val});
  const item=getDetailItem(ref);
  if(!item) return;
  const [stLabel,stCls]=STATUS_MAP[val]||['TO DO','st-todo'];
  document.querySelectorAll('.dm-badges .st-badge').forEach(el=>{
    el.className=`st-badge ${stCls}`;
    el.textContent=stLabel;
  });
}
function detailSavePriority(ref){
  const val=document.getElementById('dm-priority').value;
  setIS(ref,{customPriority:val});
  const idx=(ST.adhoc||[]).findIndex(a=>a.source_ref===ref);
  if(idx>=0){ ST.adhoc[idx].priority=val; saveState(ST); }
  const dot=PRIO_DOT[val]||'#2ea043';
  document.querySelectorAll('.dm-prio-badge').forEach(el=>{
    el.innerHTML=`<span class="dm-prio-dot" style="background:${dot}"></span>${PRIO_LABEL[val]||'LOW'}`;
  });
}
function detailMarkDone(ref){
  setIS(ref,{done:true,status:'done',doneAt:new Date().toISOString()});
  closeDetail();
}
function detailRemove(ref){
  if(!confirm('Remove this item?')) return;
  ST.adhoc=(ST.adhoc||[]).filter(a=>a.source_ref!==ref);
  delete ST.items[ref];
  saveState(ST);
  closeDetail();
}
function detailRemoveTag(ref,tag){
  const is=getIS(ref);
  setIS(ref,{customTags:(is.customTags||[]).filter(t=>t!==tag)});
  renderDetail(ref);
}
function detailTagKeydown(e,ref){
  if(e.key==='Enter'||e.key===','||e.key===' '){
    e.preventDefault();
    const val=e.target.value.trim().toLowerCase().replace(/[^a-z0-9\-]/g,'');
    if(!val) return;
    const item=buildItems().find(i=>i.source_ref===ref);
    const existing=item?item.allTags:[];
    if(!existing.includes(val)){
      const is=getIS(ref);
      setIS(ref,{customTags:[...(is.customTags||[]),val]});
    }
    e.target.value='';
    renderDetail(ref);
  }
}
function detailAddLink(ref){
  const url=prompt('Enter URL:');
  if(!url||!url.trim()) return;
  const label=prompt('Label (optional):')||'';
  const is=getIS(ref);
  setIS(ref,{customLinks:[...(is.customLinks||[]),{url:url.trim(),label:label.trim()}]});
  renderDetail(ref);
}
function detailRemoveLink(ref,idx){
  const is=getIS(ref);
  setIS(ref,{customLinks:(is.customLinks||[]).filter((_,i)=>i!==idx)});
  renderDetail(ref);
}

// ─────────────────────────────────────────────
// Skills tab
// ─────────────────────────────────────────────
// Map skill names to friendly icons
const SKILL_ICONS = {
  'tasks-board': '📋', 'docx': '📝', 'pdf': '📄', 'pptx': '📊', 'xlsx': '📈',
  'schedule': '⏰', 'skill-creator': '🔧', 'team-pulse': '💓',
  'quarterly-delivery-report': '📦', 'roi-initiative-report': '💰',
  'pentagon-metrics-report': '📐', 'datadog-service-catalog-validator': '🐶',
  'setup-cowork': '🚀', 'consolidate-memory': '🧠',
  'cowork-plugin-customizer': '🔌', 'create-cowork-plugin': '🏗️',
  'rt-strategy-kr1-updater': '🎯',
};
function skillIcon(name) {
  return SKILL_ICONS[name] || '⚡';
}

let _skillsRendered = false;
function renderSkills(force) {
  if (_skillsRendered && !force) return;
  _skillsRendered = true;
  const q = (document.getElementById('skills-search').value || '').toLowerCase().trim();
  const filtered = q
    ? POOL_SKILLS.filter(s =>
        s.name.toLowerCase().includes(q) ||
        (s.description || '').toLowerCase().includes(q) ||
        (s.plugin || '').toLowerCase().includes(q))
    : POOL_SKILLS;

  const container = document.getElementById('skills-sections');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="skill-no-results"><span class="skill-no-results-icon">🔍</span>No skills match "${esc(q)}"</div>`;
    return;
  }

  // Split into user-created vs built-in
  const userSkills   = filtered.filter(s => !s.is_default);
  const defaultSkills = filtered.filter(s => s.is_default);

  // User skills: group by plugin (null = local)
  const userGroups = {};
  userSkills.forEach(s => {
    const key = s.plugin || '__local__';
    if (!userGroups[key]) userGroups[key] = [];
    userGroups[key].push(s);
  });

  // Local first, then plugins alphabetically
  const userOrder = Object.keys(userGroups).sort((a, b) => {
    if (a === '__local__') return -1;
    if (b === '__local__') return 1;
    return a.localeCompare(b);
  });

  function skillCard(s) {
    return `
      <div class="skill-card">
        <div class="skill-card-head">
          <span class="skill-icon">${skillIcon(s.name)}</span>
          <span class="skill-name">${esc(s.name)}</span>
          ${s.plugin ? `<span class="skill-plugin-badge">${esc(s.plugin)}</span>` : ''}
        </div>
        ${s.description ? `<div class="skill-desc">${esc(s.description)}</div>` : ''}
      </div>`;
  }

  let html = '';

  // ── User-created skills (prominent) ──
  if (userSkills.length > 0) {
    html += userOrder.map(key => {
      const label = key === '__local__' ? 'My Skills' : key;
      const items = userGroups[key];
      return `
        <div class="skills-section">
          <div class="skills-section-title">${esc(label)} (${items.length})</div>
          <div class="skills-grid">${items.map(skillCard).join('')}</div>
        </div>`;
    }).join('');
  }

  // ── Built-in Cowork skills (collapsible, closed by default) ──
  if (defaultSkills.length > 0) {
    const cards = defaultSkills.map(skillCard).join('');
    html += `
      <div class="skills-builtin-wrap">
        <div class="skills-builtin-hdr" onclick="toggleBuiltinSkills(this)">
          <span class="skills-builtin-title">🔧 Built-in Skills</span>
          <span class="skills-builtin-cnt">${defaultSkills.length}</span>
          <span class="skills-builtin-hint">Skills that come with Cowork</span>
          <span class="skills-builtin-caret">▼</span>
        </div>
        <div class="skills-builtin-body">
          <div class="skills-grid">${cards}</div>
        </div>
      </div>`;
  }

  container.innerHTML = html;
}

function toggleBuiltinSkills(hdr) {
  const body = hdr.nextElementSibling;
  const caret = hdr.querySelector('.skills-builtin-caret');
  const open = body.classList.toggle('open');
  caret.textContent = open ? '▲' : '▼';
}

function filterSkills() {
  renderSkills(true);
}

// ─────────────────────────────────────────────
// Keyboard shortcuts
// ─────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if((e.metaKey||e.ctrlKey)&&e.key==='r'){ e.preventDefault(); location.reload(); }
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){ e.preventDefault(); openModal(); }
  if(e.key==='Escape'){ closeModal(); closeDetail(); }
});

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
render();
</script>
