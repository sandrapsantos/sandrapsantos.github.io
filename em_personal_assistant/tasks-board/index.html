<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .lock-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .lock-icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  p  { font-size: 14px; color: #8b949e; margin-bottom: 28px; }
  input[type=password] {
    width: 100%;
    padding: 10px 14px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 15px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color .2s;
  }
  input[type=password]:focus { border-color: #388bfd; }
  button {
    width: 100%;
    padding: 10px;
    background: #238636;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: #2ea043; }
  .remember-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    text-align: left;
  }
  .remember-row input { width: auto; margin: 0; }
  .remember-row label { font-size: 13px; color: #8b949e; cursor: pointer; }
  .error {
    display: none;
    margin-top: 12px;
    color: #f85149;
    font-size: 13px;
  }
  .spinner {
    display: none;
    margin-top: 12px;
    font-size: 13px;
    color: #8b949e;
  }
</style>
</head>

const EM_HUB_PW_KEY = 'em_hub_pw';

// Auto-unlock if password is stored
(async function autoUnlock() {
  const saved = localStorage.getItem(EM_HUB_PW_KEY);
  if (!saved) return;
  try {
    const dec = await decryptPayload(saved, PAYLOAD);
    document.open(); document.write(dec); document.close();
  } catch(e) {
    // Saved password no longer valid (new encryption) — clear it
    localStorage.removeItem(EM_HUB_PW_KEY);
  }
})();

async function unlock() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;
  document.getElementById('err').style.display = 'none';
  document.getElementById('spin').style.display = 'block';

  try {
    const dec = await decryptPayload(pw, PAYLOAD);
    // Save password if "Remember me" is checked
    if (document.getElementById('remember').checked) {
      localStorage.setItem(EM_HUB_PW_KEY, pw);
    }
    document.open();
    document.write(dec);
    document.close();
  } catch(e) {
    document.getElementById('spin').style.display = 'none';
    document.getElementById('err').style.display = 'block';
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});

async function decryptPayload(password, payload) {
  const enc = new TextEncoder();

  const salt = base64ToBytes(payload.salt);
  const iv   = base64ToBytes(payload.iv);
  const tag  = base64ToBytes(payload.tag);
  const ct   = base64ToBytes(payload.ct);

  // Derive key with PBKDF2
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  // AES-GCM decrypt — tag is appended to ciphertext as expected by Web Crypto
  const ctWithTag = new Uint8Array(ct.length + tag.length);
  ctWithTag.set(ct);
  ctWithTag.set(tag, ct.length);

  const plainBuf = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv },
    key,
    ctWithTag
  );

  return new TextDecoder().decode(plainBuf);
}

function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
